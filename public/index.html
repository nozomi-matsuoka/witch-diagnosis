// ============================================================
// UTILS
// ============================================================
function addScores(total, scores) {
  const next = { ...total };
  for (const [k, v] of Object.entries(scores)) next[k] = (next[k]||0) + v;
  return next;
}

function calcType(scores, lateJP, lateEI) {
  const e = scores.E||0, i = scores.I||0;
  const EI = e !== i ? (e > i ? "E" : "I") : (lateEI || "I");
  const NS = (scores.N||0) > (scores.S||0) ? "N" : "S";
  const TF = (scores.T||0) > (scores.F||0) ? "T" : "F";
  const JP = (scores.J||0) !== (scores.P||0)
    ? ((scores.J||0) > (scores.P||0) ? "J" : "P")
    : lateJP || "P";
  return EI + NS + TF + JP;
}

// フェーズ判定（step → 1〜5）
function getPhase(step) {
  if (step === "result") return 5;
  if (["q7","q8","q9","item2","q10","item3","q11","item4","q12","q13","q14","q15","ending"].includes(step)) return 4;
  if (["item1","q4","q5","q6"].includes(step)) return 3;
  if (["q1","q2","q3"].includes(step)) return 2;
  return 1;
}

  async function sendResult(entry) {
    if (!RESULT_API_URL) return;
    try {
      const ans = entry.answers || {};
      const payload = {
        type: entry.type,
        typeName: TYPE_RESULTS[entry.type] ? TYPE_RESULTS[entry.type].name : "",
        ending: entry.ending,
        job: ans.job || "",
        item1: ans.item1 || "",
        item2: ans.item2 || "",
        item3: ans.item3 || "",
        item4: ans.item4 || "",
        answers: ans,
        playedAt: new Date().toISOString(),
      };
      await fetch(RESULT_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
    } catch(e) {
      console.warn('送信エラー:', e);
    }
  }

          <div style={{position:"absolute",top:"36px",right:"48px",fontSize:"26px",color:"rgba(140,123,191,0.55)"}}>✦</div>
          <div style={{position:"absolute",bottom:"36px",left:"48px",fontSize:"26px",color:"rgba(140,123,191,0.55)"}}>✦</div>
          <div style={{position:"absolute",bottom:"36px",right:"48px",fontSize:"26px",color:"rgba(140,123,191,0.55)"}}>✦</div>
          {/* コンテンツ */}
          <p style={{fontSize:"13px",color:"#8c7bbf",letterSpacing:"0.35em",marginBottom:"22px",fontFamily:"'Noto Sans JP',sans-serif"}}>不思議な森と魔女の館の物語</p>
          <p style={{fontSize:"16px",color:"#6b5ca5",letterSpacing:"0.25em",marginBottom:"28px",fontFamily:"'Noto Sans JP',sans-serif"}}>あなたのタイプは</p>
          <p style={{fontSize:"68px",color:"#3a2d6f",letterSpacing:"0.15em",fontWeight:"300",marginBottom:"18px",textAlign:"center"}}>{"✦ " + typeData.name + " ✦"}</p>
          <p style={{fontSize:"22px",color:"#5b2a4f",letterSpacing:"0.14em",marginBottom:"28px"}}>{CATCHCOPY[resultType] || ""}</p>
          <p style={{fontSize:"14px",color:"#8c7bbf",letterSpacing:"0.55em",fontFamily:"'Noto Sans JP',sans-serif"}}>{resultType}</p>
        </div>
      )}

      {/* 霧エフェクト（Phase 1-2で表示） */}
      <div className="wt-fog">
        {[
          {top:"58%",  w:"380px", h:"85px",  c:"rgba(175,165,230,0.06)", a:"fogDrift1", d:"28s",  delay:"0s"},
          {top:"70%",  w:"480px", h:"105px", c:"rgba(155,145,210,0.05)", a:"fogDrift2", d:"36s",  delay:"5s"},
          {top:"52%",  w:"290px", h:"72px",  c:"rgba(195,182,238,0.05)", a:"fogDrift1", d:"22s",  delay:"13s"},

          <div key={i} className="wt-fog-puff" style={{
            top:f.top, width:f.w, height:f.h,
            background:`radial-gradient(ellipse at center, ${f.c} 0%, transparent 70%)`,
            animation:`${f.a} ${f.d} linear ${f.delay} infinite`,
          }}/>
        ))}
      </div>

      {/* 星パーティクル（Phase 3-5で表示） */}
      <div className="wt-particles">
        {[
          {left:"7%",  delay:"0s",   dur:"9s"},
          {left:"16%", delay:"1.8s", dur:"11s"},
          {left:"28%", delay:"3.2s", dur:"8s"},
          {left:"40%", delay:"0.6s", dur:"10s"},
          {left:"52%", delay:"5s",   dur:"7.5s"},
          {left:"63%", delay:"2.4s", dur:"12s"},
          {left:"74%", delay:"4.1s", dur:"9s"},
          {left:"85%", delay:"1.2s", dur:"8.5s"},
          {left:"22%", delay:"6.5s", dur:"10.5s"},
          {left:"58%", delay:"3.8s", dur:"9.5s"},
          {left:"36%", delay:"7.2s", dur:"8s"},
          {left:"91%", delay:"2s",   dur:"11.5s"},
        ].map((p, i) => (
          <span key={i} className="wt-particle" style={{left:p.left, animationDelay:p.delay, animationDuration:p.dur}}>✦</span>
        ))}
      </div>

      {/* ローディングオーバーレイ（エンディング→結果の演出） */}
      {isLoading && (
        <div style={{position:"fixed",inset:0,background:"rgba(5,3,18,0.94)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999,flexDirection:"column",gap:"1.5rem",animation:"loadingFadeIn 0.5s ease"}}>

          <p style={{color:"#c8a96e",fontSize:"0.94rem",lineHeight:"2.2",textAlign:"center",letterSpacing:"0.15em",whiteSpace:"pre-line",fontFamily:"'Noto Serif JP','Georgia',serif",fontStyle:"italic",opacity:0.9}}>{"占いの結果が\n明らかになる……"}</p>
        </div>
      )}

      <div style={S.stars}>{"✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧"}</div>
      <div style={{fontSize:"0.69rem", color:"rgba(200,169,110,0.5)", letterSpacing:"0.1em", marginBottom:"1.5rem", fontFamily:"'Noto Sans JP',sans-serif"}}>
        <a href="/privacy.html" style={{color:"rgba(200,169,110,0.5)", textDecoration:"none"}}>プライバシーポリシー・利用規約</a>
      </div>
    </div>
  );
}

function SingleItemSelect({ chapter, text, items, onSelect }) {
  return (
    <FadeIn>
      <p style={S.chapterLabel}>{chapter}</p>
      <p style={S.question} className="wt-question">{text}</p>
      <div style={S.itemGrid} className="wt-itemGrid">
        {items.map(item => (
          <button key={item.id} style={S.itemBtn} className="wt-itemBtn" onClick={() => onSelect(item)}>
            <span style={S.itemEmoji}>{item.label.split(" ")[0]}</span>
            <span style={S.itemName}>{item.label.split(" ").slice(1).join(" ")}</span>
            <span style={S.itemDesc} className="wt-itemDesc">{item.desc}</span>
          </button>
        ))}
      </div>
    </FadeIn>
  );
}

function FadeIn({ children }) {
  return <div style={S.fadeIn}>{children}</div>;
}

// 星座型プログレスインジケーター
function ProgressIndicator({ currentIndex, phase }) {
  const starColor = phase === 5 ? '#e9c16a'
    : phase === 4 ? '#e0d8f0'
    : phase === 3 ? '#c8b9ff'
    : '#b9a6ff';
  const glowColor = phase === 5 ? 'rgba(233,193,106,0.7)' : 'rgba(185,166,255,0.7)';
  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',width:'100%',padding:'0 0.5rem',gap:0}}>
      {PROGRESS_STEPS.map((s, i) => {
        const isAnswered = i < currentIndex;
        const isCurrent = i === currentIndex;
        const dotSize = isCurrent ? 9 : 6;
        return (
          <React.Fragment key={s}>
            {i > 0 && (
              <div style={{flex:1,height:'1px',background:isAnswered?starColor:'rgba(255,255,255,0.15)',opacity:isAnswered?0.7:1,transition:'background 0.8s ease',minWidth:'2px'}}/>
            )}
            <div style={{width:dotSize+'px',height:dotSize+'px',borderRadius:'50%',background:(isAnswered||isCurrent)?starColor:'rgba(255,255,255,0.15)',opacity:isCurrent?1:isAnswered?0.9:0.3,boxShadow:(isAnswered||isCurrent)?`0 0 5px ${glowColor}, 0 0 10px ${glowColor}`:'none',animation:isCurrent?'starPulse 1.8s ease-in-out infinite':'none',transition:'background 0.8s ease, box-shadow 0.8s ease',flexShrink:0}}/>
          </React.Fragment>
        );
      })}
    </div>
  );
}
